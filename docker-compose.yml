version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai_product_db
    environment:
      POSTGRES_USER: aiproduct
      POSTGRES_PASSWORD: aiproduct123
      POSTGRES_DB: aiproduct
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiproduct"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_product_app
    environment:
      # Application
      APP_NAME: "AI Product-to-Code System"
      APP_VERSION: "1.0.0"
      ENVIRONMENT: "production"
      DEBUG: "false"
      
      # API
      API_V1_PREFIX: "/api/v1"
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://localhost:8000"]'
      
      # Security
      SECRET_KEY: "change-this-to-a-real-secret-key-in-production"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      
      # Database - PostgreSQL
      DATABASE_URL: "postgresql+asyncpg://aiproduct:aiproduct123@postgres:5432/aiproduct"
      
      # Optional AI Service Keys (can be added later)
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      TAVILY_API_KEY: "${TAVILY_API_KEY:-}"
      
      # Optional Observability (Langfuse)
      LANGFUSE_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY:-}"
      LANGFUSE_SECRET_KEY: "${LANGFUSE_SECRET_KEY:-}"
      LANGFUSE_HOST: "https://cloud.langfuse.com"
      
      # Admin
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "admin123"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    restart: unless-stopped

volumes:
  postgres_data:
